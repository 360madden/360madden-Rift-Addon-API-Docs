    <h2><a name="RiftSlider.Event:LeftClick">RiftSlider.Event:LeftClick</a> </h2>
    <p><i></i> Signals that the mouse's left button has been clicked inside the frame. Blocks left mouse events and mouse movement events from frames below this one. May block right mouse events depending on the MouseMasking mode.</p>
