    <h2><a name="RiftWindowBorder.Event:MouseOut">RiftWindowBorder.Event:MouseOut</a> </h2>
    <p><i></i> Signals that the mouse cursor has been moved off of the frame. Blocks mouse movement events from frames below this one. May block left and right events depending on the MouseMasking mode.</p>
