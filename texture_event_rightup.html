    <h2><a name="Texture.Event:RightUp">Texture.Event:RightUp</a> </h2>
    <p><i></i> Signals that the mouse's right button has been released inside the frame. Blocks right mouse events and mouse movement events from frames below this one. May block left mouse events depending on the MouseMasking mode.</p>
