    <h2><a name="Canvas.Event:LeftUp">Canvas.Event:LeftUp</a> </h2>
    <p><i></i> Signals that the mouse's left button has been released inside the frame. Blocks left mouse events and mouse movement events from frames below this one. May block right mouse events depending on the MouseMasking mode.</p>
