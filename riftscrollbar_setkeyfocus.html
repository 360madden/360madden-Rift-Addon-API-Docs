    <h2><a name="RiftScrollbar:SetKeyFocus">RiftScrollbar:SetKeyFocus</a> </h2>
    <p><i></i> Sets the key focus status. Note that only one frame can be the key focus at a time. Focusing on another frame will automatically unset the current focus.</p>
    <h3>Usage:   </h3>
