    <h2><a name="RiftButton.Event:MouseIn">RiftButton.Event:MouseIn</a> </h2>
    <p><i></i> Signals that the mouse cursor has been moved onto the frame. Blocks mouse movement events from frames below this one. May block left and right events depending on the MouseMasking mode.</p>
