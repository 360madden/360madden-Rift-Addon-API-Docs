    <h2><a name="Inspect.Time.Frame">Inspect.Time.Frame</a> </h2>
    <p><i></i> The game time of the last frame. This function's return value will not change until the next frame.</p>
    <h3>Usage:   </h3>
    <table>
      <tr><td colspan=4><i>time</i> = Inspect.Time.Frame()</td></tr>
      <tr><th>Parameter</th><th>Type</th><th>Datatype</th><th>Description</th></tr>
      <tr><td><i>time</i></td><td>result</td><td><i>number</i></td><td>Time in seconds. Counted from an arbitrary point in the past. Guaranteed to be non-negative.</td></tr>
