    <h2><a name="UI.Frame">UI.Frame</a> </h2>
    <p><i></i> Lists all frames that have been created. Organizes them under [addonIdentifier][contextIdentifier][constructionOrder]. As an example, if TestAddon created four frames named UIElement, the second would be UI.Frame.TestAddon.UIElement[2].</p>
