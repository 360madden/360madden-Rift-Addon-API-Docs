    <h2><a name="Texture.Event:RightDown">Texture.Event:RightDown</a> </h2>
    <p><i></i> Signals that the mouse's right button has been pressed inside the frame. Blocks right mouse events and mouse movement events from frames below this one. May block left mouse events depending on the MouseMasking mode.</p>
